<!-- Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
  (click)="cancel()">

  <!-- Panel -->
  <div class="w-full max-w-lg rounded-2xl p-6 bg-gray-900 border border-gray-800 shadow-2xl"
    (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-lg font-bold text-white">{{ isEdit ? 'Edit Task' : 'New Task' }}</h2>
        <p class="text-xs text-gray-500 mt-0.5">{{ isEdit ? 'Update task details below.' : 'Fill in the details to create a task.' }}</p>
      </div>
      <button (click)="cancel()"
        class="w-8 h-8 rounded-lg border border-gray-700 bg-gray-800 hover:bg-gray-700 text-gray-500 hover:text-gray-300 flex items-center justify-center transition-all text-sm">
        ✕
      </button>
    </div>

    <!-- Error -->
    <div *ngIf="error"
      class="mb-4 px-4 py-2.5 rounded-xl bg-rose-500/5 border border-rose-500/20 text-rose-400 text-sm">
      {{ error }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="submit()" class="flex flex-col gap-5">

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Title <span class="text-rose-400 normal-case tracking-normal font-normal">*</span></label>
        <input [(ngModel)]="form.title" name="title" required
          placeholder="What needs to be done?"
          class="w-full bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-600 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/20 transition-all"/>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Description</label>
        <textarea [(ngModel)]="form.description" name="description" rows="3"
          placeholder="Add more details…"
          class="w-full bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-600 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/20 transition-all resize-none">
        </textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Priority</label>
        <div class="grid grid-cols-3 gap-2">
          <button *ngFor="let p of priorities" type="button"
            (click)="form.priority = p.value"
            [ngClass]="form.priority === p.value ? p.activeClass : p.idleClass">
            {{ p.label }}
          </button>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Due Date</label>
        <input [(ngModel)]="form.dueDate" name="dueDate" type="date"
          class="w-full bg-gray-800 border border-gray-700 text-gray-400 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500/50 transition-colors"/>
      </div>

      <!-- Assignee -->
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Assign To</label>
        <div class="grid grid-cols-3 gap-2">
          <!-- Unassigned option -->
          <button type="button" (click)="form.assignedTo = undefined"
            [ngClass]="!form.assignedTo
              ? 'border-cyan-500 bg-cyan-500/10 text-cyan-400'
              : 'border-gray-700 bg-transparent text-gray-500 hover:border-gray-600 hover:text-gray-400'"
            class="flex items-center gap-2 px-3 py-2 rounded-xl border text-xs font-medium transition-all duration-150">
            <span class="w-6 h-6 rounded-full bg-gray-700 border border-gray-600 flex items-center justify-center text-gray-500 text-xs shrink-0">—</span>
            <span class="truncate">Unassigned</span>
          </button>
          <!-- User options -->
          <button *ngFor="let u of users" type="button" (click)="form.assignedTo = u.id"
            [ngClass]="form.assignedTo === u.id
              ? 'border-cyan-500 bg-cyan-500/10 text-cyan-400'
              : 'border-gray-700 bg-transparent text-gray-500 hover:border-gray-600 hover:text-gray-300'"
            class="flex items-center gap-2 px-3 py-2 rounded-xl border text-xs font-medium transition-all duration-150">
            <span class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0"
              [ngClass]="avatarBg[u.color] ?? 'bg-gray-500'">{{ u.initials }}</span>
            <span class="truncate">{{ u.name.split(' ')[0] }}</span>
          </button>
        </div>
      </div>

      <label *ngIf="isEdit" class="flex items-center gap-3 cursor-pointer select-none py-1">
        <div class="relative">
          <input [(ngModel)]="form.isCompleted" name="isCompleted" type="checkbox" class="sr-only peer"/>
          <div class="w-9 h-5 rounded-full bg-gray-700 peer-checked:bg-emerald-500 transition-colors"></div>
          <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform peer-checked:translate-x-4"></div>
        </div>
        <span class="text-sm text-gray-300">Mark as completed</span>
      </label>

      <div class="flex gap-3 pt-1">
        <button type="button" (click)="cancel()"
          class="flex-1 py-2.5 rounded-xl border border-gray-700 bg-gray-800 text-gray-400 font-medium text-sm hover:bg-gray-700 hover:text-gray-200 transition-all">
          Cancel
        </button>
        <button type="submit" [disabled]="saving"
          class="flex-1 py-2.5 rounded-xl bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold text-sm disabled:opacity-40 disabled:cursor-not-allowed shadow-lg shadow-cyan-500/20 transition-all active:scale-95">
          <span *ngIf="saving">Saving…</span>
          <span *ngIf="!saving">{{ isEdit ? 'Save Changes' : 'Create Task' }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
